<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Davo Mexican</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

font-family:'Montserrat',sans-serif;

background:
linear-gradient(
rgba(0,0,0,0.78),
rgba(10,0,20,0.92)
),

url('https://images.unsplash.com/photo-1512813195386-6cf811ad3542?q=80&w=2070');

background-size:cover;
background-position:center;

color:white;

}

/* STARS */

.stars{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
}

.stars span{
position:absolute;
background:#00ffee;
border-radius:50%;
box-shadow:0 0 10px #00ffee, 0 0 20px #ff0066, 0 0 30px #00ffee;
animation:starsMove linear infinite;
}

.stars span:nth-child(1){left:10%;width:2px;height:2px;animation-duration:10s;}
.stars span:nth-child(2){left:25%;width:4px;height:4px;animation-duration:12s;}
.stars span:nth-child(3){left:40%;width:2px;height:2px;animation-duration:8s;}
.stars span:nth-child(4){left:60%;width:3px;height:3px;animation-duration:15s;}
.stars span:nth-child(5){left:75%;width:2px;height:2px;animation-duration:11s;}
.stars span:nth-child(6){left:90%;width:4px;height:4px;animation-duration:13s;}

@keyframes starsMove{
0%{transform:translateY(100vh);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-120vh);opacity:0;}
}

/* PANEL */

.panel{
position:relative;
width:900px;
height:560px;
border-radius:50%;

background:
linear-gradient(135deg,rgba(0,25,50,0.55),rgba(0,0,0,0.78));

backdrop-filter:blur(15px);

border:2px solid rgba(0,255,255,0.15);

box-shadow:0 0 30px rgba(0,255,255,0.25),0 0 70px rgba(255,0,100,0.15);

display:flex;
flex-direction:column;
justify-content:space-between;
align-items:center;

padding:45px;

animation:floatPanel 6s ease infinite;
}

@keyframes floatPanel{
0%{transform:translateY(0px);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0px);}
}

/* AVATAR */

.avatar{
position:relative;
width:220px;
height:220px;
border-radius:50%;
padding:6px;
background:linear-gradient(45deg,#00ffee,#ff0066,#00ffee);
background-size:300% 300%;
animation:neonFlow 6s ease infinite;
overflow:hidden;
box-shadow:0 0 20px #00ffee,0 0 50px #ff0066,0 0 90px #00ffee;
margin-top:10px;
}

.avatar::before{
content:"";
position:absolute;
top:-15px;left:-15px;right:-15px;bottom:-15px;
border-radius:50%;
border:4px solid transparent;
border-top:4px solid #00ffee;
border-bottom:4px solid #ff0066;
animation:rotateCircle 4s linear infinite;
}

@keyframes rotateCircle{
100%{transform:rotate(360deg);}
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
border-radius:50%;
}

/* TITLE */

h1{
font-size:58px;
font-family:'Orbitron',sans-serif;
letter-spacing:7px;
background:linear-gradient(45deg,#00ffee,#ff0066,#ffffff);
background-size:300% 300%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:titleMove 8s ease infinite;
}

@keyframes titleMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* MAGIC */

.magic{
text-align:center;
}

.magic p{
font-size:18px;
letter-spacing:2px;
margin:10px 0;
color:#e0ffff;
text-shadow:0 0 10px #00ffee,0 0 20px #ff0066;
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{opacity:0.6;}
50%{opacity:1;}
100%{opacity:0.6;}
}

/* YOUTUBE (FIXED) */

.player{
width:55%;
height:150px;
border-radius:18px;
overflow:hidden;
border:2px solid #00ffee;
box-shadow:0 0 15px #00ffee,0 0 30px #ff0066;
margin-bottom:15px;
position:relative;
}

.player iframe{
width:100%;
height:100%;
}

.openYT{
position:absolute;
bottom:8px;
right:10px;
font-size:11px;
color:#00ffee;
text-decoration:none;
background:rgba(0,0,0,0.5);
padding:4px 8px;
border-radius:10px;
backdrop-filter:blur(5px);
}

.openYT:hover{
color:#ff0066;
}

/* FOOTER */

.footer{
font-size:12px;
letter-spacing:5px;
color:#9fffff;
margin-bottom:5px;
opacity:0.7;
}

</style>

</head>

<body>

<div class="stars">
<span></span><span></span><span></span>
<span></span><span></span><span></span>
</div>

<div class="panel">

<div class="avatar">
<img src="https://xatimg.com/image/MB4AGs1juPvW.jpg">
</div>

<h1>DAVO</h1>

<div class="magic">
<p>🌵 Espíritu Azteca 🌵</p>
<p>🔥 Fuego Mexicano 🔥</p>
<p>💀 Noche de Neon 💀</p>
<p>🌙 Sueños del Desierto 🌙</p>
<p>⚡ Magia Infinita ⚡</p>
</div>

<!-- FIXED YOUTUBE -->
<div class="player">

<iframe
src="https://www.youtube.com/embed/Q8T9g7memUk?autoplay=1&loop=1&playlist=Q8T9g7memUk"
frameborder="0"
allow="autoplay; encrypted-media"
allowfullscreen>
</iframe>

<a class="openYT" href="https://www.youtube.com/watch?v=Q8T9g7memUk" target="_blank">
Open ↗
</a>

</div>

<div class="footer">
MEXICAN SOMBRERO STYLE
</div>

</div>

</body>
</html>
